<style>
  @import url('https://fonts.googleapis.com/css2?family=Zilla+Slab:wght@400;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap');

  :root{
    --bg:#EDEFE9;
    --panel:#FFFFFF;
    --ink:#202A24;
    --ink-soft:#5B6B60;
    --stamp:#A13D3D;
    --brass:#C79A3E;
    --line:#D3D8CE;
    --ok:#4C7A5E;
    --warn:#C79A3E;
    --alert:#A13D3D;
    --focus:#2F5D50;
    --shadow-sm:0 1px 2px rgba(32,42,36,0.06), 0 1px 1px rgba(32,42,36,0.04);
    --shadow-md:0 4px 14px rgba(32,42,36,0.08), 0 1px 3px rgba(32,42,36,0.06);
    --shadow-lg:0 10px 30px rgba(32,42,36,0.14), 0 2px 6px rgba(32,42,36,0.08);
  }
  *{box-sizing:border-box;}
  #piket-root{
    font-family:'Inter',sans-serif;
    color:var(--ink);
    background:
      radial-gradient(circle at 100% 0%, rgba(199,154,62,0.06) 0%, transparent 45%),
      radial-gradient(circle at 0% 100%, rgba(47,93,80,0.05) 0%, transparent 45%),
      var(--bg);
    min-height:100vh;
    padding:0;
    margin:0;
    -webkit-font-smoothing:antialiased;
  }
  #piket-root h1,#piket-root h2,#piket-root h3{
    font-family:'Zilla Slab',serif;
    margin:0;
  }
  .mono{font-family:'IBM Plex Mono',monospace;}

  /* Slim custom scrollbar for polish */
  ::-webkit-scrollbar{height:8px;width:8px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:var(--line);border-radius:8px;}
  ::-webkit-scrollbar-thumb:hover{background:var(--ink-soft);}

  .nameplate{
    background:var(--panel);
    border-bottom:1px solid var(--line);
    box-shadow:var(--shadow-sm);
    padding:16px 28px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:10px;
    position:sticky; top:0; z-index:60;
  }
  .nameplate .title{display:flex;flex-direction:column;gap:2px;}
  .nameplate .title h1{font-size:clamp(17px,3vw,22px);letter-spacing:0.3px;}
  .nameplate .title .sub{font-size:10.5px;letter-spacing:2px;text-transform:uppercase;color:var(--ink-soft);}
  .who{display:flex;align-items:center;gap:10px;font-size:13px;flex-wrap:wrap;}
  .who > span{white-space:nowrap;}
  .who .role-badge{
    border:1px solid var(--focus);color:var(--focus);padding:3px 10px;border-radius:20px;
    font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:1px;text-transform:uppercase;
  }
  .btn{
    font-family:'Inter',sans-serif;font-weight:600;font-size:13px;
    border:1px solid var(--ink);background:var(--panel);color:var(--ink);
    padding:9px 16px;border-radius:5px;cursor:pointer;
    transition:transform .12s ease, box-shadow .12s ease, background-color .15s ease, color .15s ease;
    min-height:38px;
  }
  .btn:hover{background:var(--ink);color:var(--panel);box-shadow:var(--shadow-sm);transform:translateY(-1px);}
  .btn:active{transform:translateY(0);}
  .btn:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
  .btn:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible{
    outline:2px solid var(--focus);outline-offset:2px;
  }
  .btn-primary{background:var(--focus);color:#fff;border-color:var(--focus);box-shadow:var(--shadow-sm);}
  .btn-primary:hover{background:#1f4238;box-shadow:var(--shadow-md);}
  .btn-quiet{border-color:var(--line);color:var(--ink-soft);background:var(--panel);}
  .btn-quiet:hover{background:var(--line);color:var(--ink);}
  .btn-danger{border-color:var(--stamp);color:var(--stamp);background:transparent;}
  .btn-danger:hover{background:var(--stamp);color:#fff;}

  .tabs{
    display:flex;gap:2px;padding:0 28px;background:var(--panel);border-bottom:1px solid var(--line);
    overflow-x:auto;position:sticky;top:65px;z-index:55;-webkit-overflow-scrolling:touch;
  }
  .tabs::-webkit-scrollbar{height:0;}
  .tab{
    font-family:'Zilla Slab',serif;font-weight:600;font-size:14px;padding:13px 20px;cursor:pointer;
    color:var(--ink-soft);background:transparent;border:none;border-bottom:3px solid transparent;white-space:nowrap;
    transition:color .15s ease, border-color .15s ease; min-height:44px;
  }
  .tab:hover{color:var(--ink);}
  .tab.active{color:var(--ink);border-bottom:3px solid var(--stamp);}

  .content{padding:24px 28px 60px;max-width:1150px;margin:0 auto;}

  .panel{
    background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:22px;margin-bottom:20px;
    box-shadow:var(--shadow-sm); transition:box-shadow .2s ease;
  }
  .panel h2{font-size:17px;margin-bottom:4px;}
  .panel .desc{font-size:12.5px;color:var(--ink-soft);margin-bottom:16px;}

  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px 18px;}
  .form-grid .full{grid-column:1/-1;}
  label{
    display:block;font-size:11.5px;font-weight:600;text-transform:uppercase;
    letter-spacing:0.6px;color:var(--ink-soft);margin-bottom:5px;
  }
  input, select, textarea{
    width:100%;font-family:'Inter',sans-serif;font-size:14px;padding:10px 11px;
    border:1px solid var(--line);border-radius:6px;background:#fdfdfc;color:var(--ink);
    transition:border-color .15s ease, box-shadow .15s ease;
  }
  input:focus, select:focus, textarea:focus{border-color:var(--focus); box-shadow:0 0 0 3px rgba(47,93,80,0.12);}
  input:disabled{background:#F0F1EC;color:var(--ink-soft);}
  textarea{resize:vertical;min-height:60px;}

  /* Tables scroll horizontally inside their panel on narrow screens without breaking layout */
  .panel{overflow-x:auto;}
  table{width:100%;border-collapse:collapse;font-size:13.5px;min-width:560px;}
  thead th{
    text-align:left;font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:0.8px;
    text-transform:uppercase;color:var(--ink-soft);padding:9px 10px;border-bottom:2px solid var(--ink);

  tbody td{padding:11px 10px;border-bottom:1px solid var(--line);vertical-align:top;}

  table.compact-rows tbody td{padding:5px 10px;}
  .empty-row td{text-align:center;color:var(--ink-soft);padding:30px 10px;font-style:italic;min-width:0;}

  .stamp{

    letter-spacing:1px;text-transform:uppercase;padding:4px 9px;border:1.5px solid currentColor;
    border-radius:3px;transform:rotate(-2deg);white-space:nowrap;

  .stamp.ok{color:var(--ok);}
  .stamp.warn{color:var(--warn);}
  .stamp.alert{color:var(--stamp);}
  .stamp.neutral{color:var(--ink-soft);}

  .filter-row{display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end;margin-bottom:16px;}
  .filter-row > div{min-width:150px;flex:1;}
  .filter-actions{display:flex;gap:10px;margin-left:auto;flex-wrap:wrap;}

  .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
  .login-card{
    background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:38px 34px;
    width:100%;max-width:380px;box-shadow:var(--shadow-lg);
    position:relative; overflow:hidden;
  }
  .login-card::before{
    content:'';position:absolute;top:0;left:0;right:0;height:4px;
    background:linear-gradient(90deg, var(--focus), var(--brass));
  }
  .login-card h1{font-size:24px;margin-bottom:2px;}
  .login-card .sub{font-size:12px;color:var(--ink-soft);margin-bottom:24px;letter-spacing:1px;text-transform:uppercase;}
  .login-card label{margin-top:14px;}
  .login-card label:first-of-type{margin-top:0;}
  .error-msg{color:var(--stamp);font-size:12.5px;margin-top:10px;min-height:16px;}

  .row-actions{display:flex;gap:8px;flex-wrap:wrap;}
  .row-actions button{font-size:11px;padding:6px 10px;min-height:30px;white-space:nowrap;}
  th.col-aksi, td.col-aksi{width:1%;white-space:nowrap;}
  td.col-aksi.row-actions{flex-wrap:nowrap;}
  .pagination{display:flex;align-items:center;justify-content:center;gap:14px;margin-top:14px;flex-wrap:wrap;}
  .pagination .pg-info{font-size:12px;color:var(--ink-soft);}
  .pagination button:disabled{opacity:.4;cursor:not-allowed;}
  .icon-btn{display:inline-flex;align-items:center;justify-content:center;padding:7px 10px;}

  .toast{
    position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(6px);background:var(--ink);color:#fff;
    padding:11px 22px;border-radius:8px;font-size:13px;z-index:999;opacity:0;pointer-events:none;
    transition:opacity .25s ease, transform .25s ease;max-width:80vw;text-align:center;box-shadow:var(--shadow-md);
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}
  .toast.error{background:var(--stamp);}

  .stat-row{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:20px;}
  .stat-card{
    flex:1;min-width:130px;background:var(--panel);border:1px solid var(--line);
    border-left:4px solid var(--stamp);border-radius:6px;padding:14px 16px;box-shadow:var(--shadow-sm);
  }
  .stat-card .num{font-family:'Zilla Slab',serif;font-size:28px;font-weight:700;}
  .stat-card .lbl{font-size:11px;text-transform:uppercase;letter-spacing:0.5px;color:var(--ink-soft);}

  .center-msg{text-align:center;padding:60px 20px;color:var(--ink-soft);font-family:'IBM Plex Mono',monospace;font-size:13px;}
  .subtabs{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap;}
  .subtab{
    font-size:12.5px;font-weight:600;padding:7px 15px;border:1px solid var(--line);border-radius:20px;
    background:var(--panel);color:var(--ink-soft);cursor:pointer;transition:all .15s ease;min-height:34px;
  }
  .subtab:hover{border-color:var(--ink-soft);}
  .subtab.active{background:var(--ink);color:#fff;border-color:var(--ink);}

  .modal-backdrop{
    position:fixed;inset:0;background:rgba(32,42,36,0.5);backdrop-filter:blur(1.5px);display:flex;
    align-items:center;justify-content:center;z-index:1000;padding:20px;
    animation:fadeIn .15s ease;

  .modal-card{
    background:var(--panel);border:1px solid var(--line);border-radius:10px;
    padding:28px 26px;width:100%;max-width:380px;box-shadow:var(--shadow-lg);
    animation:popIn .18s ease;
  }
  @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
  @keyframes popIn{from{opacity:0;transform:scale(0.96) translateY(6px);}to{opacity:1;transform:scale(1) translateY(0);}}
  .modal-card h2{font-size:18px;margin-bottom:4px;}
  .modal-card .desc{font-size:12.5px;color:var(--ink-soft);margin-bottom:18px;}
  .modal-actions{display:flex;gap:10px;margin-top:18px;}

  .sig-wrap{

  .sig-hint{position:absolute;bottom:6px;left:10px;font-size:11px;color:var(--ink-soft);pointer-events:none;}
  .sig-actions{display:flex;gap:10px;margin-top:8px;}
  .img-modal-card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:20px;max-width:420px;width:100%;box-shadow:var(--shadow-lg);}
  .img-modal-card img{width:100%;border:1px solid var(--line);border-radius:6px;background:#fff;}

  .checkbox-group{
    display:flex;flex-wrap:wrap;gap:8px;padding:10px;
    border:1px solid var(--line);border-radius:6px;background:#fdfdfc;max-height:160px;overflow-y:auto;

  .checkbox-item{
    display:flex;align-items:center;gap:6px;font-size:13px;font-weight:500;
    padding:6px 12px;border:1px solid var(--line);border-radius:20px;background:var(--panel);cursor:pointer;

  .checkbox-item:hover{border-color:var(--focus);}
  .checkbox-item input{width:auto;margin:0;accent-color:var(--focus);}
  .checkbox-item:has(input:checked){background:var(--focus);color:#fff;border-color:var(--focus);}

  .two-col-grid{display:grid;grid-template-columns:320px 1fr;gap:20px;align-items:start;}
  .radio-group{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;}
  .radio-item{
    display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600;
    padding:7px 15px;border:1px solid var(--line);border-radius:20px;background:var(--panel);cursor:pointer;
    transition:all .15s ease; min-height:34px;
  }
  .radio-item:hover{border-color:var(--ink-soft);}
  .radio-item input{width:auto;margin:0;accent-color:var(--focus);}
  .radio-item:has(input:checked){background:var(--ink);color:#fff;border-color:var(--ink);}
  .clickable-row{cursor:pointer;}
  .clickable-row:hover{background:#EEF1EB !important;}
  .clickable-row.selected{background:#E4EAE2 !important;}
  .siswa-detail-header{
    display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px;
    padding:14px 16px;background:#F6F7F3;
    border:1px solid var(--line);border-radius:6px;margin-bottom:16px;font-size:13.5px;
  }
  .siswa-detail-header b{display:block;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;color:var(--ink-soft);font-weight:600;margin-bottom:2px;}
  @media (max-width:900px){ .two-col-grid{grid-template-columns:1fr;} }

  .landing-topbar{
    position:sticky;top:0;z-index:100;
    background:var(--panel);border-bottom:2px solid var(--ink);
    display:flex;justify-content:space-between;align-items:center;
    padding:12px 24px;flex-wrap:wrap;gap:10px;
  }
  .landing-topbar .brand{display:flex;flex-direction:column;line-height:1.3;}
  .landing-topbar .brand .sch-name{font-family:'Zilla Slab',serif;font-weight:700;font-size:16px;}
  .landing-topbar .brand .sch-sub{font-size:10.5px;letter-spacing:1px;text-transform:uppercase;color:var(--ink-soft);}

  @media print{
    .nameplate, .tabs, .no-print{display:none !important;}
    #piket-root{background:#fff;}
    .content{padding:0;max-width:100%;}
    .panel{border:none;padding:0;box-shadow:none;overflow-x:visible;}
    table{min-width:0;}
  }

  /* ---------- Responsive breakpoints ---------- */
  @media (max-width:900px){
    .content{padding:20px 18px 50px;}
  }
  @media (max-width:768px){
    .nameplate{top:0;}
    .tabs{top:64px;}
    .stat-row{gap:10px;}
    .stat-card{min-width:105px;padding:12px 12px;}
    .stat-card .num{font-size:23px;}
  }
  @media (max-width:640px){
    .form-grid{grid-template-columns:1fr;}
    .nameplate{padding:12px 16px;}
    .content{padding:16px;}
    .tabs{padding:0 16px;}
    .panel{padding:16px;border-radius:6px;}
    .who{font-size:12px;gap:8px;}
    .who .role-badge{padding:2px 8px;font-size:10px;}
    .btn{padding:9px 14px;font-size:12.5px;}
    .filter-actions{width:100%;}
    .filter-actions .btn{flex:1;}
    .login-card{padding:30px 22px;}
    table{min-width:480px;}
  }
  @media (max-width:400px){
    .nameplate .title .sub{display:none;}
  }
  @media (prefers-reduced-motion: reduce){ *{transition:none !important; animation:none !important;} }
</style>

  function todayStr(){ return new Date().toISOString().slice(0,10); }
  let filterState = { dari: todayStr(), sampai: todayStr(), kelas:'', jenis:'' };

  // ---------------- Supabase REST helper ----------------
  async function sb(path, options={}){
    const bearer = (state.session && state.session.access_token) ? state.session.access_token : SUPABASE_KEY;
    const headers = {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + bearer,
      'Content-Type': 'application/json',
      ...(options.headers||{})
    };
    if(options.method && options.method !== 'GET' && !headers['Prefer']){
      headers['Prefer'] = 'return=representation';
    }
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, { ...options, headers });
    if(!res.ok){
      let detail = '';
      try{ const j = await res.json(); detail = j.message || JSON.stringify(j); }catch(e){ detail = res.statusText; }
      throw new Error(`(${res.status}) ${detail}`);
    }
    if(res.status === 204) return null;
    const text = await res.text();
    return text ? JSON.parse(text) : null;
  }

  // ---------------- Supabase Auth (GoTrue) helper ----------------
  const AUTH_URL = `${SUPABASE_URL}/auth/v1`;
  const SESSION_KEY = 'piket_session_v1';

  function usernameToEmail(u){ return u.trim().toLowerCase() + '@piket.local'; }

  function saveSession(tokenData){
    const expiresAt = Date.now() + (tokenData.expires_in||3600)*1000;
    state.session = {
      access_token: tokenData.access_token,
      refresh_token: tokenData.refresh_token,
      user_id: tokenData.user.id,
      expires_at: expiresAt,
    };
    try{ localStorage.setItem(SESSION_KEY, JSON.stringify(state.session)); }catch(e){}
  }

  function clearSession(){
    state.session = null;
    state.currentUser = null;
    try{ localStorage.removeItem(SESSION_KEY); }catch(e){}
  }

  function loadSessionFromStorage(){
    try{
      const raw = localStorage.getItem(SESSION_KEY);
      return raw ? JSON.parse(raw) : null;
    }catch(e){ return null; }
  }

  async function authTokenRequest(body){
    const res = await fetch(`${AUTH_URL}/token?grant_type=${body.grant_type}`, {
      method: 'POST',
      headers: { 'apikey': SUPABASE_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify(body.payload)
    });
    const data = await res.json();
    if(!res.ok){
      const msg = (data && (data.msg || data.error_description || data.error)) || 'Gagal login';
      const banned = res.status === 403 || /banned|disabled|nonaktif/i.test(msg);
      const e = new Error(msg);
      e.banned = banned;
      throw e;
    }
    return data;
  }

  async function fetchProfileById(userId){
    const rows = await sb(`profiles?id=eq.${userId}&select=*`);

  // Coba pulihkan sesi dari localStorage saat aplikasi dibuka ulang.
  async function tryRestoreSession(){
    const saved = loadSessionFromStorage();
    if(!saved) return false;
    try{
      if(saved.expires_at && saved.expires_at - Date.now() > 30000){
        state.session = saved;
      } else {
        const data = await authTokenRequest({ grant_type:'refresh_token', payload:{ refresh_token: saved.refresh_token } });
        saveSession(data);
      }
      const profile = await fetchProfileById(state.session.user_id);
      if(!profile) throw new Error('Profil tidak ditemukan');
      state.currentUser = profileToCurrentUser(profile);
      state.tab = state.currentUser.level === 'kepsek' ? 'laporan' : 'catat';
      return true;
    }catch(err){
      console.error('Gagal memulihkan sesi:', err);
      clearSession();
      return false;
    }
  }

  // ---------------- Boot: load reference data ----------------
  async function boot(){
    try{
      const [siswaRes, waliRes, userRes, infoRes, alasanRes, kelasRes, tahunRes, guruTahunRes, tahunAktifRes, pelajaranRes, jadwalPiketRes] = await Promise.all([
        sb(`siswa?select=*&order=kelas.asc,nama.asc`),
        sb(`wali_kelas?select=*&order=kelas.asc`),
        sb(`profiles?select=user_name,nama,mapel`),
        sb(`info_landing?select=*&order=jenis.asc,urutan.asc`),
        sb(`alasan?select=*&order=deskripsi.asc`),
        sb(`kelas?select=id,kls&order=id.asc`),
        sb(`catat_piket?select=tahun_ajaran`),
        sb(`catat_guru?select=tahun_ajaran`),
        sb(`tahun_pelajaran?aktif=eq.Y&select=tahun`),
        sb(`pelajaran?select=id,mapel&order=id.asc`),
        sb(`jadwal_piket?select=*&order=id.asc`),
      ]);
      state.siswa = siswaRes || [];
      state.waliKelas = waliRes || [];
      state.operatorMap = {};
      state.namaMapelMap = {};
      (userRes||[]).forEach(u=>{
        state.operatorMap[u.user_name] = u.nama;
        if(u.nama) state.namaMapelMap[u.nama] = u.mapel || '';
      });
      state.guruNamaList = [...new Set((userRes||[]).map(u=>u.nama).filter(Boolean))].sort((a,b)=>a.localeCompare(b,'id'));
      state.landingInfo = infoRes || [];
      state.alasanList = alasanRes || [];
      state.kelasList = (kelasRes||[]).map(k=>k.kls).filter(Boolean);
      state.tahunAjaranList = [...new Set((tahunRes||[]).map(r=>r.tahun_ajaran).filter(Boolean))].sort().reverse();
      state.individuTahunAjaran = state.tahunAjaranList[0] || '';
      state.guruTahunAjaranList = [...new Set((guruTahunRes||[]).map(r=>r.tahun_ajaran).filter(Boolean))].sort().reverse();
      state.guruIndividuTahunAjaran = state.guruTahunAjaranList[0] || '';
      state.tahunAjaranAktif = (tahunAktifRes && tahunAktifRes[0]) ? tahunAktifRes[0].tahun : '';
      state.pelajaranList = (pelajaranRes||[]).map(p=>p.mapel).filter(Boolean);
      state.jadwalPiketList = jadwalPiketRes || [];
      state.bootError = '';
    }catch(err){
      console.error(err);
      state.bootError = 'Gagal terhubung ke database: ' + err.message;
    }
    state.booting = false;
    render();
  }

  const operatorNamaCache = {};
  async function getOperatorInfo(username){
    if(operatorNamaCache[username]) return operatorNamaCache[username];
    try{
      const rows = await sb(`user?user_name=eq.${enc(username)}&select=nama,nip`);
      const info = (rows && rows[0]) ? {nama: rows[0].nama || username, nip: rows[0].nip || ''} : {nama: username, nip:''};
      operatorNamaCache[username] = info;
      return info;
    }catch(e){ return {nama: username, nip:''}; }
  }

  function closePasswordModal(){
    const el = document.getElementById('pw-modal-backdrop');
    if(el) el.remove();
  }

  function openPasswordModal(){
    if(document.getElementById('pw-modal-backdrop')) return;
    const wrap = document.createElement('div');
    wrap.innerHTML = passwordModalHtml();
    root.appendChild(wrap.firstElementChild);

    const backdrop = document.getElementById('pw-modal-backdrop');
    backdrop.addEventListener('click', (e)=>{ if(e.target === backdrop) closePasswordModal(); });
    document.getElementById('pw-cancel-btn').addEventListener('click', closePasswordModal);

    document.getElementById('pw-form').addEventListener('submit', async (e)=>{
      e.preventDefault();
      const errEl = document.getElementById('pw-error');
      errEl.textContent = '';
      const oldPw = document.getElementById('pw-old').value;
      const newPw = document.getElementById('pw-new').value;
      const confirmPw = document.getElementById('pw-confirm').value;

      if(newPw.length < 4){ errEl.textContent = 'Password baru minimal 4 karakter.'; return; }
      if(newPw !== confirmPw){ errEl.textContent = 'Konfirmasi password baru tidak cocok.'; return; }

      const btn = document.getElementById('pw-submit-btn');
      btn.disabled = true; btn.textContent = 'Memeriksa…';
      try{
        // Verifikasi password lama dengan mencoba re-login (tanpa mengubah sesi aktif)
        try{
          await authTokenRequest({
            grant_type: 'password',
            payload: { email: usernameToEmail(state.currentUser.user_name), password: oldPw }
          });
        }catch(verifyErr){
          errEl.textContent = 'Password lama salah.';
          btn.disabled = false; btn.textContent = 'Simpan Password';
          return;
        }
        btn.textContent = 'Menyimpan…';
        const res = await fetch(`${AUTH_URL}/user`, {
          method: 'PUT',
          headers: {
            'apikey': SUPABASE_KEY,
            'Authorization': 'Bearer ' + state.session.access_token,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ password: newPw })
        });
        if(!res.ok){
          const j = await res.json().catch(()=>({}));
          throw new Error(j.msg || j.error_description || 'Gagal menyimpan password baru.');
        }
        closePasswordModal();
        showToast('Password berhasil diubah.');
      }catch(err){
        console.error(err);
        errEl.textContent = 'Gagal mengubah password: ' + err.message;
        btn.disabled = false; btn.textContent = 'Simpan Password';
      }
    });
  }

  // ---------------- SIGNATURE PAD ----------------
  function setupSignaturePad(canvas){
    const ctx = canvas.getContext('2d');
    let drawing = false;
    let hasDrawn = false;

    function resize(){
      const rect = canvas.getBoundingClientRect();
      const ratio = window.devicePixelRatio || 1;
      const prev = canvas._imgBackup;
      canvas.width = rect.width * ratio;
      canvas.height = rect.height * ratio;
      ctx.scale(ratio, ratio);
      ctx.lineWidth = 2;
      ctx.lineCap = 'round';
      ctx.strokeStyle = '#202A24';
      if(prev){ ctx.drawImage(prev, 0, 0, rect.width, rect.height); }
    }
    resize();
    window.addEventListener('resize', resize);

    function pos(e){
      const rect = canvas.getBoundingClientRect();
      const p = e.touches ? e.touches[0] : e;
      return { x: p.clientX - rect.left, y: p.clientY - rect.top };
    }
    function start(e){ e.preventDefault(); drawing = true; hasDrawn = true; const p = pos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); }
    function move(e){ if(!drawing) return; e.preventDefault(); const p = pos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); }
    function end(){ drawing = false; }

    canvas.addEventListener('mousedown', start);
    canvas.addEventListener('mousemove', move);
    window.addEventListener('mouseup', end);
    canvas.addEventListener('touchstart', start, {passive:false});
    canvas.addEventListener('touchmove', move, {passive:false});
    canvas.addEventListener('touchend', end);

    canvas._clear = ()=>{ const rect = canvas.getBoundingClientRect(); ctx.clearRect(0,0,rect.width,rect.height); hasDrawn = false; };
    canvas._hasDrawn = ()=> hasDrawn;
    canvas._getDataUrl = ()=> canvas.toDataURL('image/png');
  }

  async function renderKelola(){
    if(state.kelolaSub === 'user' && !state._usersLoadedOnce){
      renderShell(`<div class="center-msg">Memuat data…</div>`);
      await loadUsersForKelola();
      state._usersLoadedOnce = true;
    }
    const subtabs = [
      {id:'siswa', label:'Data Siswa'},
      {id:'wali', label:'Wali Kelas'},
      {id:'user', label:'Akun Pengguna'},
      {id:'info', label:'Info Depan'},
      {id:'alasan', label:'Master Alasan'},
      {id:'jadwalpiket', label:'Jadwal Piket'},
    ];

    let body = '';
    if(state.kelolaSub === 'siswa') body = kelolaSiswaHtml();
    else if(state.kelolaSub === 'wali') body = kelolaWaliHtml();
    else if(state.kelolaSub === 'user') body = kelolaUserHtml();
    else if(state.kelolaSub === 'info') body = kelolaInfoHtml();
    else if(state.kelolaSub === 'alasan') body = kelolaAlasanHtml();
    else body = kelolaJadwalPiketHtml();

    const html = `
      <div class="subtabs no-print">
        ${subtabs.map(t=>`<button class="subtab ${state.kelolaSub===t.id?'active':''}" data-sub="${t.id}">${t.label}</button>`).join('')}
      </div>
      ${body}
    `;
    renderShell(html);
    root.querySelectorAll('[data-sub]').forEach(b=>{
      b.addEventListener('click', async ()=>{
        state.kelolaSub = b.dataset.sub;
        if(state.kelolaSub === 'user' && !state._usersLoadedOnce){ await loadUsersForKelola(); state._usersLoadedOnce = true; }
        renderKelola();
      });
    });
    root.querySelectorAll('[data-pg-prev]').forEach(b=>{
      b.addEventListener('click', ()=>{
        const key = 'page' + b.dataset.pgPrev.charAt(0).toUpperCase() + b.dataset.pgPrev.slice(1);
        state[key] = Math.max(1, (state[key]||1) - 1);
        renderKelola();
      });
    });
    root.querySelectorAll('[data-pg-next]').forEach(b=>{
      b.addEventListener('click', ()=>{
        const key = 'page' + b.dataset.pgNext.charAt(0).toUpperCase() + b.dataset.pgNext.slice(1);
        state[key] = (state[key]||1) + 1;
        renderKelola();
      });
    });
    root.querySelectorAll('[data-pg-size]').forEach(sel=>{
      sel.addEventListener('change', ()=>{
        const prefix = sel.dataset.pgSize;
        const cap = prefix.charAt(0).toUpperCase() + prefix.slice(1);
        state['pageSize'+cap] = sel.value === 'all' ? 'all' : Number(sel.value);
        state['page'+cap] = 1;
        renderKelola();
      });
    });
    attachKelolaHandlers();
  }

  // ---------------- Pagination helper (Data Siswa/Wali/Akun) ----------------
  const PAGE_SIZE_OPTIONS = [10, 20, 50, 100, 'all'];

  function paginateList(list, page, pageSize){
    const total = list.length;
    if(pageSize === 'all'){
      return { items: list, page: 1, totalPages: 1, total };
    }
    const size = Number(pageSize) || 20;
    const totalPages = Math.max(1, Math.ceil(total/size));
    const p = Math.min(Math.max(1, page||1), totalPages);
    const start = (p-1)*size;
    return { items: list.slice(start, start+size), page:p, totalPages, total };
  }

  function paginationHtml(prefix, page, totalPages, total, pageSize){
    if(total === 0) return '';
    return `
      <div class="pagination no-print">
        <button type="button" class="btn btn-quiet" data-pg-prev="${prefix}" ${page<=1?'disabled':''}>&larr; Sebelumnya</button>
        <span class="pg-info">Halaman ${page} dari ${totalPages} (${total} data)</span>
        <button type="button" class="btn btn-quiet" data-pg-next="${prefix}" ${page>=totalPages?'disabled':''}>Berikutnya &rarr;</button>
        <span class="pg-info" style="display:flex;align-items:center;gap:6px;">
          Tampilkan:
          <select data-pg-size="${prefix}" style="padding:4px 6px;">
            ${PAGE_SIZE_OPTIONS.map(opt=>`<option value="${opt}" ${String(pageSize)===String(opt)?'selected':''}>${opt==='all'?'Semua':opt}</option>`).join('')}
          </select>
        </span>
      </div>
    `;
  }

  function attachKelolaHandlers(){
    // ---- Siswa ----
    const sForm = document.getElementById('siswa-form');
    if(sForm){
      if(state.editingSiswaId){
        const s = state.siswa.find(x=>x.id===state.editingSiswaId);
        if(s){
          document.getElementById('s-nama').value = s.nama||'';
          document.getElementById('s-nisn').value = s.nisn||'';
          document.getElementById('s-kelas').value = s.kelas||'';
          document.getElementById('s-tahun').value = s.tahun_masuk||'';
          document.getElementById('s-gender').value = s.gender||'L';
          document.getElementById('s-agama').value = s.agama||'';
          document.getElementById('s-hpsiswa').value = s.hp_siswa||'';
          document.getElementById('s-hportu').value = s.hp_ortu||'';
          document.getElementById('s-asal').value = s.asal_sekolah||'';
          document.getElementById('s-alumni').value = String(!!s.status_alumni);
          document.getElementById('s-submit-btn').textContent = 'Simpan Perubahan';
          document.getElementById('s-cancel-btn').style.display = 'inline-block';
        }
      }
      sForm.addEventListener('submit', async (e)=>{
        e.preventDefault();
        const payload = {
          nama: document.getElementById('s-nama').value.trim(),
          nisn: document.getElementById('s-nisn').value.trim(),
          kelas: document.getElementById('s-kelas').value.trim(),
          tahun_masuk: document.getElementById('s-tahun').value ? Number(document.getElementById('s-tahun').value) : null,
          gender: document.getElementById('s-gender').value,
          agama: document.getElementById('s-agama').value.trim(),
          hp_siswa: document.getElementById('s-hpsiswa').value.trim(),
          hp_ortu: document.getElementById('s-hportu').value.trim(),
          asal_sekolah: document.getElementById('s-asal').value.trim(),
          status_alumni: document.getElementById('s-alumni').value === 'true',
        };
        const btn = document.getElementById('s-submit-btn'); btn.disabled = true;
        try{
          if(state.editingSiswaId){
            await sb(`siswa?id=eq.${state.editingSiswaId}`, {method:'PATCH', body: JSON.stringify(payload)});
            showToast('Data siswa diperbarui.');
            state.editingSiswaId = null;
          } else {
            await sb('siswa', {method:'POST', body: JSON.stringify([payload])});
            showToast('Siswa ditambahkan.');
          }
          state.siswa = await sb('siswa?select=*&order=kelas.asc,nama.asc') || [];
          renderKelola();
        }catch(err){ console.error(err); showToast('Gagal menyimpan: '+err.message, 'error'); btn.disabled=false; }
      });
      document.getElementById('s-cancel-btn').addEventListener('click', ()=>{ state.editingSiswaId=null; renderKelola(); });
      root.querySelectorAll('[data-edit-siswa]').forEach(b=>{
        b.addEventListener('click', ()=>{ state.editingSiswaId = Number(b.dataset.editSiswa); renderKelola(); });
      });
      root.querySelectorAll('[data-del-siswa]').forEach(b=>{
        b.addEventListener('click', async ()=>{
          if(!confirm('Hapus data siswa ini?')) return;
          try{
            await sb(`siswa?id=eq.${b.dataset.delSiswa}`, {method:'DELETE'});
            state.siswa = state.siswa.filter(s=>String(s.id)!==b.dataset.delSiswa);
            showToast('Siswa dihapus.');
            renderKelola();
          }catch(err){ console.error(err); showToast('Gagal menghapus: '+err.message, 'error'); }
        });
      });
    }

    // ---- Wali Kelas ----
    const wForm = document.getElementById('wali-form');
    if(wForm){
      if(state.editingWaliId){
        const w = state.waliKelas.find(x=>x.id===state.editingWaliId);
        if(w){
          document.getElementById('w-kelas').value = w.kelas||'';
          document.getElementById('w-nama').value = w.nama_wali||'';
          document.getElementById('w-submit-btn').textContent = 'Simpan Perubahan';
          document.getElementById('w-cancel-btn').style.display = 'inline-block';
        }
      }
      wForm.addEventListener('submit', async (e)=>{
        e.preventDefault();
        const payload = { kelas: document.getElementById('w-kelas').value.trim(), nama_wali: document.getElementById('w-nama').value.trim() };
        const btn = document.getElementById('w-submit-btn'); btn.disabled = true;
        try{
          if(state.editingWaliId){
            await sb(`wali_kelas?id=eq.${state.editingWaliId}`, {method:'PATCH', body: JSON.stringify(payload)});
            showToast('Wali kelas diperbarui.');
            state.editingWaliId = null;
          } else {
            await sb('wali_kelas', {method:'POST', body: JSON.stringify([payload])});
            showToast('Wali kelas ditambahkan.');
          }
          state.waliKelas = await sb('wali_kelas?select=*&order=kelas.asc') || [];
          renderKelola();
        }catch(err){ console.error(err); showToast('Gagal menyimpan: '+err.message, 'error'); btn.disabled=false; }
      });
      document.getElementById('w-cancel-btn').addEventListener('click', ()=>{ state.editingWaliId=null; renderKelola(); });
      root.querySelectorAll('[data-edit-wali]').forEach(b=>{
        b.addEventListener('click', ()=>{ state.editingWaliId = Number(b.dataset.editWali); renderKelola(); });
      });
      root.querySelectorAll('[data-del-wali]').forEach(b=>{
        b.addEventListener('click', async ()=>{
          if(!confirm('Hapus data wali kelas ini?')) return;
          try{
            await sb(`wali_kelas?id=eq.${b.dataset.delWali}`, {method:'DELETE'});
            state.waliKelas = state.waliKelas.filter(w=>String(w.id)!==b.dataset.delWali);
            showToast('Wali kelas dihapus.');
            renderKelola();
          }catch(err){ console.error(err); showToast('Gagal menghapus: '+err.message, 'error'); }
        });
      });
    }

    // ---- User ----
    // Catatan: form tambah/edit/hapus akun sudah dilepas dari tampilan
    // (lihat kelolaUserHtml) karena butuh komponen server tambahan untuk
    // mengelola akun Supabase Auth secara aman. Tabel di atas tetap
    // menampilkan daftar akun (read-only) dari public.profiles.


    // ---- Info Depan (jam piket & pengumuman) ----
    const iForm = document.getElementById('info-form');
    if(iForm){
      if(state.editingInfoId){
        const i = state.landingInfo.find(x=>x.id===state.editingInfoId);
        if(i){
          document.getElementById('i-jenis').value = i.jenis||'jam_piket';
          document.getElementById('i-urutan').value = i.urutan||0;
          document.getElementById('i-judul').value = i.judul||'';
          document.getElementById('i-konten').value = i.konten||'';
          document.getElementById('i-aktif').value = String(i.aktif!==false);
          document.getElementById('i-submit-btn').textContent = 'Simpan Perubahan';
          document.getElementById('i-cancel-btn').style.display = 'inline-block';
        }
      }
      iForm.addEventListener('submit', async (e)=>{
        e.preventDefault();
        const payload = {
          jenis: document.getElementById('i-jenis').value,
          urutan: Number(document.getElementById('i-urutan').value) || 0,
          judul: document.getElementById('i-judul').value.trim(),
          konten: document.getElementById('i-konten').value.trim(),
          aktif: document.getElementById('i-aktif').value === 'true',
        };
        const btn = document.getElementById('i-submit-btn'); btn.disabled = true;
        try{
          if(state.editingInfoId){
            await sb(`info_landing?id=eq.${state.editingInfoId}`, {method:'PATCH', body: JSON.stringify(payload)});
            showToast('Info diperbarui.');
            state.editingInfoId = null;
          } else {
            await sb('info_landing', {method:'POST', body: JSON.stringify([payload])});
            showToast('Info ditambahkan.');
          }
          state.landingInfo = await sb('info_landing?select=*&order=jenis.asc,urutan.asc') || [];
          renderKelola();
        }catch(err){ console.error(err); showToast('Gagal menyimpan: '+err.message, 'error'); btn.disabled=false; }
      });
      document.getElementById('i-cancel-btn').addEventListener('click', ()=>{ state.editingInfoId=null; renderKelola(); });
      root.querySelectorAll('[data-edit-info]').forEach(b=>{
        b.addEventListener('click', ()=>{ state.editingInfoId = Number(b.dataset.editInfo); renderKelola(); });
      });
      root.querySelectorAll('[data-del-info]').forEach(b=>{
        b.addEventListener('click', async ()=>{
          if(!confirm('Hapus info ini?')) return;
          try{
            await sb(`info_landing?id=eq.${b.dataset.delInfo}`, {method:'DELETE'});
            state.landingInfo = state.landingInfo.filter(i=>String(i.id)!==b.dataset.delInfo);
            showToast('Info dihapus.');
            renderKelola();
          }catch(err){ console.error(err); showToast('Gagal menghapus: '+err.message, 'error'); }
        });
      });
    }

    // ---- Master Alasan ----
    const alForm = document.getElementById('alasan-form');
    if(alForm){
      if(state.editingAlasanId){
        const a = state.alasanList.find(x=>x.id===state.editingAlasanId);
        if(a){
          document.getElementById('al-deskripsi').value = a.deskripsi||'';
          document.getElementById('al-keterangan').value = a.keterangan||'';
          document.getElementById('al-submit-btn').textContent = 'Simpan Perubahan';
          document.getElementById('al-cancel-btn').style.display = 'inline-block';
        }
      }
      alForm.addEventListener('submit', async (e)=>{
        e.preventDefault();
        const payload = {
          deskripsi: document.getElementById('al-deskripsi').value.trim(),
          keterangan: document.getElementById('al-keterangan').value.trim(),
        };
        const btn = document.getElementById('al-submit-btn'); btn.disabled = true;
        try{
          if(state.editingAlasanId){
            await sb(`alasan?id=eq.${state.editingAlasanId}`, {method:'PATCH', body: JSON.stringify(payload)});
            showToast('Alasan diperbarui.');
            state.editingAlasanId = null;
          } else {
            await sb('alasan', {method:'POST', body: JSON.stringify([payload])});
            showToast('Alasan ditambahkan.');
          }
          state.alasanList = await sb('alasan?select=*&order=deskripsi.asc') || [];
          renderKelola();
        }catch(err){ console.error(err); showToast('Gagal menyimpan: '+err.message, 'error'); btn.disabled=false; }
      });
      document.getElementById('al-cancel-btn').addEventListener('click', ()=>{ state.editingAlasanId=null; renderKelola(); });
      root.querySelectorAll('[data-edit-alasan]').forEach(b=>{
        b.addEventListener('click', ()=>{ state.editingAlasanId = Number(b.dataset.editAlasan); renderKelola(); });
      });
      root.querySelectorAll('[data-del-alasan]').forEach(b=>{
        b.addEventListener('click', async ()=>{
          if(!confirm('Hapus alasan ini?')) return;
          try{
            await sb(`alasan?id=eq.${b.dataset.delAlasan}`, {method:'DELETE'});
            state.alasanList = state.alasanList.filter(a=>String(a.id)!==b.dataset.delAlasan);
            showToast('Alasan dihapus.');
            renderKelola();
          }catch(err){ console.error(err); showToast('Gagal menghapus: '+err.message, 'error'); }
        });
      });
    }

    // ---- Jadwal Piket ----
    const jpForm = document.getElementById('jadwalpiket-form');
    if(jpForm){
      if(state.editingJadwalPiketId){
        const j = state.jadwalPiketList.find(x=>x.id===state.editingJadwalPiketId);
        if(j){
          document.getElementById('jp-tahun').value = j.tahun||'';
          document.getElementById('jp-hari').value = j.hari||'';
          document.getElementById('jp-nama').value = j.nama||'';
          document.getElementById('jp-aktif').value = String(j.aktif||'Y').toUpperCase()==='Y' ? 'Y' : 'N';
          document.getElementById('jp-submit-btn').textContent = 'Simpan Perubahan';
          document.getElementById('jp-cancel-btn').style.display = 'inline-block';
        }
      }
      jpForm.addEventListener('submit', async (e)=>{
        e.preventDefault();
        const payload = {
          tahun: document.getElementById('jp-tahun').value.trim(),
          hari: document.getElementById('jp-hari').value,
          nama: document.getElementById('jp-nama').value.trim(),
          aktif: document.getElementById('jp-aktif').value,
        };
        const btn = document.getElementById('jp-submit-btn'); btn.disabled = true;
        try{
          if(state.editingJadwalPiketId){
            await sb(`jadwal_piket?id=eq.${state.editingJadwalPiketId}`, {method:'PATCH', body: JSON.stringify(payload)});
            showToast('Jadwal piket diperbarui.');
            state.editingJadwalPiketId = null;
          } else {
            await sb('jadwal_piket', {method:'POST', body: JSON.stringify([payload])});
            showToast('Jadwal piket ditambahkan.');
          }
          state.jadwalPiketList = await sb('jadwal_piket?select=*&order=id.asc') || [];
          renderKelola();
        }catch(err){ console.error(err); showToast('Gagal menyimpan: '+err.message, 'error'); btn.disabled=false; }
      });
      document.getElementById('jp-cancel-btn').addEventListener('click', ()=>{ state.editingJadwalPiketId=null; renderKelola(); });
      root.querySelectorAll('[data-edit-jadwalpiket]').forEach(b=>{
        b.addEventListener('click', ()=>{ state.editingJadwalPiketId = Number(b.dataset.editJadwalpiket); renderKelola(); });
      });
      root.querySelectorAll('[data-del-jadwalpiket]').forEach(b=>{
        b.addEventListener('click', async ()=>{
          if(!confirm('Hapus jadwal piket ini?')) return;
          try{
            await sb(`jadwal_piket?id=eq.${b.dataset.delJadwalpiket}`, {method:'DELETE'});
            state.jadwalPiketList = state.jadwalPiketList.filter(j=>String(j.id)!==b.dataset.delJadwalpiket);
            showToast('Jadwal piket dihapus.');
            renderKelola();
          }catch(err){ console.error(err); showToast('Gagal menghapus: '+err.message, 'error'); }
        });
      });
    }
  }

  // ---------------- ROUTER ----------------
  function render(){
    if(state.booting){
      root.innerHTML = `<div class="login-wrap"><div class="center-msg">Menghubungkan ke database…</div></div>`;
      return;
    }
    if(!state.currentUser){ renderLogin(); return; }
    if(state.tab==='catat') renderCatat();
    else if(state.tab==='log') renderLog();
    else if(state.tab==='tamu') renderTamu();
    else if(state.tab==='catatguru') renderCatatGuru();
    else if(state.tab==='laporan') renderLaporan();
    else if(state.tab==='kelola') renderKelola();
    else renderLog();
  }

  window.addEventListener('error', (e)=>{ console.error('Uncaught error', e.error||e.message); });

  async function init(){
    state.booting = true; render();
    const restored = await tryRestoreSession();
    if(restored){
      await boot();
    } else {
      state.bootError = '';
    }
    state.booting = false;
    render();
  }

  const xlsxScript = document.createElement('script');
  xlsxScript.src = 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
  xlsxScript.onload = init;
  xlsxScript.onerror = init;
  document.head.appendChild(xlsxScript);
})();
</script>
